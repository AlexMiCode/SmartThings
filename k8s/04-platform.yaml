apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: smartthings
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
        - name: config-server
          image: smartthings/config-server:latest
          ports:
            - containerPort: 8888
          env:
            - name: CONFIG_REPO_LOCATION
              value: file:/workspace/config-repo
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: JWT_SECRET
          volumeMounts:
            - name: config-repo
              mountPath: /workspace/config-repo
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 40
            periodSeconds: 20
      volumes:
        - name: config-repo
          configMap:
            name: config-repo
---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: smartthings
spec:
  selector:
    app: config-server
  ports:
    - name: http
      port: 8888
      targetPort: 8888
---
